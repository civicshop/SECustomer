<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>ความพึงพอใจช่วงส่งมอบบ้าน</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* { font-family: 'Prompt', sans-serif; box-sizing: border-box; }

:root {
  --primary: #0B3A66;
  --primary-light: #1c5a99;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  z-index: -1;
}

.container {
  max-width: 500px;
  width: 92%;
  margin: 20px auto;
  padding: 18px;
  border-radius: 18px;
}

h2 { text-align: center; margin-bottom: 5px; }

.sub-title {
  text-align: center;
  color: #666;
  margin-bottom: 10px;
}

.logo {
  display: block;
  margin: 8px auto;
  width: 40px;
}

select, button, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

/* ปุ่ม */
button {
  background: #ccc;
  color: #fff;
  border: none;
}

/* ✅ พร้อมกด */
button:not(:disabled) {
  background: var(--primary);
  cursor: pointer;
}

button:hover:not(:disabled) {
  background: var(--primary-light);
}

/* employee */
.employee-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 15px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
}

.card img,
.employee-selected img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

.employee-selected {
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

/* stars */
.stars { font-size: 30px; }
.star { color: #ccc; }
.star.active { color: var(--primary); }

/* swal */
.swal2-image {
  border-radius: 50%;
  margin-top: 20px !important;
}

.swal2-actions {
  width: 50%;
  display: flex;
  gap: 8px;
}

.btn-confirm {
  background: #0B3A66;
  color: #fff;
  padding: 8px;
  border-radius: 8px;
}

.btn-cancel {
  background: #e0e0e0;
  padding: 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://cdn.jsdelivr.net/gh/civicshop/staff-images/SE_logo.png" class="logo">

<h2>แบบประเมินความพึงพอใจช่วงส่งมอบบ้าน</h2>
<h3 class="sub-title" id="subTitle">กรุณาเลือกโครงการ / พนักงาน</h3>

<select id="project" onchange="onProjectChange()"></select>

<div id="employeeList" class="employee-list"></div>

<div id="evaluationSection" style="display:none;">
  <div class="question"><p>1. งาน</p><div class="stars" data-q="q1"></div></div>
  <div class="question"><p>2. เวลา</p><div class="stars" data-q="q2"></div></div>
  <div class="question"><p>3. มืออาชีพ</p><div class="stars" data-q="q3"></div></div>
  <div class="question"><p>4. บริการ</p><div class="stars" data-q="q4"></div></div>
  <textarea id="q5"></textarea>
</div>

<button id="saveBtn" onclick="saveData()" style="display:none;" disabled>บันทึก</button>

</div>

<!-- ✅ THANK YOU -->
<div id="thankYou" style="display:none; text-align:center; padding:40px;">
  <h2>ขอบคุณสำหรับการประเมิน 🙏</h2>
</div>

<script>
const API_URL = "YOUR_API";

let allEmployees = [];
let selectedEmpId = "";
let scores = { q1:0,q2:0,q3:0,q4:0 };

function getImage(id){
  return `https://cdn.jsdelivr.net/gh/civicshop/staff-images/${id}.webp`;
}

async function init(){
  const res = await fetch(API_URL+"?action=init");
  const data = await res.json();
  allEmployees = data.employees;

  const sel = document.getElementById("project");
  sel.innerHTML = "<option value=''>--เลือก--</option>";
  data.projects.forEach(p=>{
    sel.innerHTML += `<option value="${p.project_id}">${p.project_name}</option>`;
  });

  initStars();
}

function onProjectChange(){
  const pid = project.value;
  let html="";
  allEmployees.filter(e=>e.project_id==pid).forEach(emp=>{
    html+=`
    <div class="card" onclick="selectEmp('${emp.emp_id}',this)">
      <img src="${getImage(emp.emp_id)}">
      <div>${emp.emp_name}</div>
    </div>`;
  });
  employeeList.innerHTML=html;
}

function selectEmp(id,el){
  selectedEmpId=id;
  const name=el.innerText;
  const img=el.querySelector("img").src;

  Swal.fire({
    title:name,
    html:"ยืนยันเลือกพนักงาน",
    imageUrl:img,
    imageWidth:80,
    showCancelButton:true,
    confirmButtonText:"ถูกต้อง",
    cancelButtonText:"แก้ไข",
    customClass:{confirmButton:"btn-confirm",cancelButton:"btn-cancel"},
    buttonsStyling:false
  }).then(r=>{
    if(!r.isConfirmed){selectedEmpId="";return;}

    subTitle.style.display="none";
    project.style.display="none";

    employeeList.className="employee-selected";
    employeeList.innerHTML=el.outerHTML;

    evaluationSection.style.display="block";
    saveBtn.style.display="block";
  });
}

function initStars(){
  document.querySelectorAll(".stars").forEach(c=>{
    let q=c.dataset.q;
    for(let i=1;i<=5;i++){
      let s=document.createElement("span");
      s.innerHTML="★";
      s.className="star";
      s.onclick=()=>{scores[q]=i;updateStars(c,i);check()};
      c.appendChild(s);
    }
  });
}

function updateStars(c,n){
  c.querySelectorAll(".star").forEach((s,i)=>{
    s.classList.toggle("active",i<n);
  });
}

function check(){
  saveBtn.disabled=!(scores.q1&&scores.q2&&scores.q3&&scores.q4);
}

async function saveData(){

  Swal.fire({title:'กำลังบันทึก...',didOpen:()=>Swal.showLoading()});

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({empId:selectedEmpId,...scores})
  });

  Swal.fire({
    icon:'success',
    title:'บันทึกสำเร็จ',
    timer:1000,
    showConfirmButton:false
  }).then(()=>{
    document.querySelector(".container").style.display="none";
    document.getElementById("thankYou").style.display="block";
  });
}

init();
</script>

</body>
</html>
